syntax = "proto3";

package ap2.assign2.service.payment;

option go_package = "github.com/fernoe1/protogen/ap2-assign2/service/payment;paymentsvc";

import "ap2-assign2/shares/payment/model.proto";

service PaymentService {
  rpc GetPaymentByOrderID(GetPaymentByOrderIDRequest) returns (GetPaymentByOrderIDResponse);
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
}

message CreatePaymentRequest {
  ap2.assign2.shares.payment.Payment payment = 1;
}

message CreatePaymentResponse {
  ap2.assign2.shares.payment.Payment payment = 1;
}

message GetPaymentByOrderIDRequest {
  string order_id = 1;
}

message GetPaymentByOrderIDResponse {
  ap2.assign2.shares.payment.Payment payment = 1;
}

